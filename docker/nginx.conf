worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # SEGURANÇA — esconder versão do Nginx
    server_tokens off;

    # SEGURANÇA — limitar tamanho de uploads
    client_max_body_size 10M;

    # SEGURANÇA — timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    server {
        listen 8080;
        root /var/www/html/public;
        index index.php;

        # SEGURANÇA — Headers de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # SEGURANÇA — esconder ficheiros sensíveis
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~ ^/(\.env|composer\.(json|lock)|package\.json|artisan) {
            deny all;
            return 404;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;

            # SEGURANÇA — timeouts PHP
            fastcgi_read_timeout 60;
        }

        # Cache de assets estáticos
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}